<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Admin</title>

<style>

body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f4f4;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
  width:300px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  background:#2a9d8f;
  color:white;
  border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>🔐 Area Amministratore</h2>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="login()">
Accedi
</button>

</div>

<script>

async function login(){

  const password =
    document.getElementById(
      "password"
    ).value;

  try{

    const res =
      await fetch(
        "/api/login",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            password
          })
        }
      );

    if(res.ok){

      location.href =
        "admin.html";

    }else{

      alert(
        "Password errata"
      );

    }

  }catch(err){

    alert(
      "Errore di connessione"
    );

    console.error(err);

  }

}

</script>

</body>
</html>
